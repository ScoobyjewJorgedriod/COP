<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Church in Pagadian City</title>
    <link rel="stylesheet" href="cop.css">
</head>

<body>

<!-- LOGIN PAGE -->
<div class="overlay">
    <img src="cop.jpg" class="logo" alt="Church Logo">

    <h1>The Church in Pagadian City</h1>

    <p class="verse">
       Numbers 1:2 “Take the sum of all the assembly of the children of Israel, by their families, by their fathers' households, according to the number of names, every male, head by head.”
    </p>

    <div class="login-card">
        <form id="login-form">
            <div class="message" id="login-message"></div>
            <input id="login-email" type="email" placeholder="Email Address" required>
            <input id="login-password" type="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <a class="secondary-link" href="register.html">Create Account</a>
        </form>
    </div>
</div>

<footer>©2020 The Church in Pagadian City - Tuburan District</footer>

<script src="cop.js"></script>
</body>

</html>
